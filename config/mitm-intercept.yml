banner_text: sorry
certificate_authority:
  ca_subject:
    common_name: MITM-INTERCEPT Lab CA
    country: US
    locality: San Francisco
    organization: Security Lab
    state: California
  certs_dir: certs
content_rules:
  banner_text: "\u26A1 MITM-INTERCEPT LAB: this page's traffic is being intercepted for\
    \ an authorized security research demo."
  enable_html_banner: true
  enable_image_swap: true
development:
  dry_run: false
  verbose: false
dns_enabled: true
dns_spoofing:
  enabled: false
  redirects: {}
enable_html_banner: true
enable_image_swap: true
health_monitor:
  auto_recover: true
  check_interval: 10
  enabled: true
  log_checks: false
interfaces:
  control_panel:
    host: 127.0.0.1
    port: 7070
  dashboard:
    host: 0.0.0.0
    port: 8080
logging:
  backup_count: 5
  creds_log_file: logs/credentials.jsonl
  enable_creds_log: true
  enable_traffic_log: true
  file: logs/mitm-intercept.log
  level: INFO
  max_size_mb: 100
  traffic_log_file: logs/traffic.jsonl
network:
  gateway_ip: ''
  interface: ''
  targets: ''
security:
  api_rate_limit: 10
  audit_log: logs/audit.log
  require_confirmation: true
targets: 192.168.100.1,192.168.100.5,192.168.100.81
transparent:
  dns_port: 5353
  http_port: 8081
  https_port: 8443
